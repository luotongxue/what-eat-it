    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #C41E3A;
            --primary-gold: #D4A574;
            --bg-cream: #F5F0E8;
            --text-dark: #2C2C2C;
            --text-gray: #666666;
            --glow-gold: #FFD700;
        }

        body {
            font-family: 'Noto Serif SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #F5F0E8 0%, #E8DFD0 50%, #F5F0E8 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            opacity: 0;
            animation: pageFadeIn 1s ease-out forwards;
        }

        @keyframes pageFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 165, 116, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(196, 30, 58, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .corner-decoration {
            position: fixed;
            width: 150px;
            height: 150px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.06;
        }

        .corner-decoration::before,
        .corner-decoration::after {
            content: '';
            position: absolute;
            background: var(--primary-gold);
        }

        .corner-decoration.top-left {
            top: 20px;
            left: 20px;
        }

        .corner-decoration.top-left::before {
            width: 80px;
            height: 2px;
            top: 0;
            left: 0;
        }

        .corner-decoration.top-left::after {
            width: 2px;
            height: 80px;
            top: 0;
            left: 0;
        }

        .corner-decoration.top-right {
            top: 20px;
            right: 20px;
        }

        .corner-decoration.top-right::before {
            width: 80px;
            height: 2px;
            top: 0;
            right: 0;
        }

        .corner-decoration.top-right::after {
            width: 2px;
            height: 80px;
            top: 0;
            right: 0;
        }

        .corner-decoration.bottom-left {
            bottom: 20px;
            left: 20px;
        }

        .corner-decoration.bottom-left::before {
            width: 80px;
            height: 2px;
            bottom: 0;
            left: 0;
        }

        .corner-decoration.bottom-left::after {
            width: 2px;
            height: 80px;
            bottom: 0;
            left: 0;
        }

        .corner-decoration.bottom-right {
            bottom: 20px;
            right: 20px;
        }

        .corner-decoration.bottom-right::before {
            width: 80px;
            height: 2px;
            bottom: 0;
            right: 0;
        }

        .corner-decoration.bottom-right::after {
            width: 2px;
            height: 80px;
            bottom: 0;
            right: 0;
        }

        .cloud-decoration {
            position: fixed;
            font-size: 60px;
            color: var(--primary-gold);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            animation: cloudFloat 20s ease-in-out infinite;
        }

        .cloud-decoration:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .cloud-decoration:nth-child(2) { top: 30%; right: 8%; animation-delay: -5s; }
        .cloud-decoration:nth-child(3) { bottom: 20%; left: 10%; animation-delay: -10s; }
        .cloud-decoration:nth-child(4) { bottom: 40%; right: 5%; animation-delay: -15s; }

        @keyframes cloudFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -10px) rotate(5deg); }
            50% { transform: translate(-5px, 5px) rotate(-3deg); }
            75% { transform: translate(15px, 10px) rotate(3deg); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 40px 0 30px;
            position: relative;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            0% { transform: translateY(-30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), var(--primary-red), var(--primary-gold), transparent);
            border-radius: 2px;
        }

        .header::before {
            content: '✦';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--primary-gold);
            font-size: 16px;
            z-index: 2;
        }

        .title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 48px;
            color: var(--primary-red);
            text-shadow: 
                2px 2px 4px rgba(0,0,0,0.1),
                0 0 30px rgba(196, 30, 58, 0.2);
            margin-bottom: 12px;
            animation: titleGlow 3s ease-in-out infinite;
            letter-spacing: 3px;
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 
                    2px 2px 4px rgba(0,0,0,0.1),
                    0 0 30px rgba(196, 30, 58, 0.2);
            }
            50% { 
                text-shadow: 
                    2px 2px 4px rgba(0,0,0,0.1),
                    0 0 40px rgba(196, 30, 58, 0.4),
                    0 0 60px rgba(196, 30, 58, 0.2);
            }
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-gray);
            letter-spacing: 4px;
            font-weight: 400;
        }

        .remaining-count {
            position: absolute;
            top: 30px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary-gold), #B8860B);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 200px);
            padding: 40px 0;
        }

        .period-hint {
            font-size: 18px;
            color: var(--text-gray);
            margin-bottom: 40px;
            text-align: center;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .lottery-container {
            position: relative;
            width: 280px;
            height: 320px;
            margin-bottom: 50px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .lottery-box {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            perspective: 1000px;
        }

        .lottery-box:hover {
            transform: scale(1.05) rotateY(5deg);
        }

        .lottery-box.shaking {
            animation: shake3D 0.8s ease-in-out;
        }

        @keyframes shake3D {
            0%, 100% { transform: rotateY(0deg) rotateZ(0deg); }
            10% { transform: rotateY(-10deg) rotateZ(-15deg); }
            20% { transform: rotateY(10deg) rotateZ(15deg); }
            30% { transform: rotateY(-8deg) rotateZ(-12deg); }
            40% { transform: rotateY(8deg) rotateZ(12deg); }
            50% { transform: rotateY(-5deg) rotateZ(-8deg); }
            60% { transform: rotateY(5deg) rotateZ(8deg); }
            70% { transform: rotateY(-3deg) rotateZ(-4deg); }
            80% { transform: rotateY(3deg) rotateZ(4deg); }
            90% { transform: rotateY(-1deg) rotateZ(-2deg); }
        }

        .box-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 180px;
            background: linear-gradient(180deg, #8B4513 0%, #654321 50%, #4A2F1D 100%);
            border-radius: 10px 10px 20px 20px;
            box-shadow: 
                0 15px 40px rgba(0,0,0,0.4),
                0 5px 15px rgba(0,0,0,0.3),
                inset 0 -10px 20px rgba(0,0,0,0.3),
                inset 0 5px 10px rgba(255,255,255,0.1),
                inset -5px 0 10px rgba(0,0,0,0.2),
                inset 5px 0 10px rgba(0,0,0,0.2);
            overflow: hidden;
            transform-style: preserve-3d;
        }

        .box-body::before {
            content: '签';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 48px;
            color: var(--primary-gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5), 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .box-body::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            opacity: 0.5;
        }

        .box-decoration {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 160px;
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 6px;
            pointer-events: none;
        }

        .box-top {
            position: absolute;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: linear-gradient(180deg, #A0522D, #8B4513);
            border-radius: 50%;
            box-shadow: 
                0 5px 15px rgba(0,0,0,0.3),
                inset 0 2px 5px rgba(255,255,255,0.2);
        }

        .box-top::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 20px;
            background: linear-gradient(180deg, #654321, #4A2F1D);
            border-radius: 50%;
        }

        .sticks {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 120px;
        }

        .stick {
            position: absolute;
            width: 6px;
            height: 100px;
            background: linear-gradient(180deg, #FFD700, #DAA520, #B8860B);
            border-radius: 3px;
            box-shadow: 
                0 2px 5px rgba(0,0,0,0.2),
                inset 0 1px 2px rgba(255,255,255,0.3);
            transition: transform 0.3s;
        }

        .stick:nth-child(1) { left: 10px; transform: rotate(-15deg); }
        .stick:nth-child(2) { left: 25px; transform: rotate(-5deg); }
        .stick:nth-child(3) { left: 40px; transform: rotate(5deg); }
        .stick:nth-child(4) { left: 55px; transform: rotate(15deg); }
        .stick:nth-child(5) { left: 70px; transform: rotate(25deg); }

        .lottery-box.shaking .stick {
            animation: stickShake 0.8s ease-in-out;
        }

        @keyframes stickShake {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-10px); }
            50% { transform: translateY(5px); }
            75% { transform: translateY(-5px); }
        }

        .flying-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 120px;
            background: linear-gradient(180deg, #FFD700, #DAA520);
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            opacity: 0;
            z-index: 10;
        }

        .flying-stick.animate {
            animation: flyOut 0.6s ease-out forwards;
        }

        @keyframes flyOut {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -150%) rotate(180deg) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -250%) rotate(360deg) scale(0.5);
            }
        }

        .draw-btn {
            background: linear-gradient(135deg, var(--primary-red), #8B0000);
            color: white;
            border: 2px solid rgba(255, 215, 0, 0.3);
            padding: 20px 70px;
            font-size: 26px;
            font-family: 'Ma Shan Zheng', cursive;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 10px 30px rgba(196, 30, 58, 0.4),
                0 5px 20px rgba(196, 30, 58, 0.3),
                inset 0 2px 4px rgba(255,255,255,0.3),
                0 0 40px rgba(196, 30, 58, 0.2);
            transition: all 0.3s;
            letter-spacing: 5px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .draw-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .draw-btn:hover::before {
            left: 100%;
        }

        .draw-btn:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 15px 40px rgba(196, 30, 58, 0.5),
                0 8px 25px rgba(196, 30, 58, 0.4),
                0 0 50px rgba(196, 30, 58, 0.3);
        }

        .draw-btn:active {
            transform: translateY(0);
        }

        .draw-btn:disabled {
            background: linear-gradient(135deg, #999, #666);
            cursor: not-allowed;
            box-shadow: none;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-gold);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 8s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: -1s; }
        .particle:nth-child(3) { left: 30%; animation-delay: -2s; }
        .particle:nth-child(4) { left: 40%; animation-delay: -3s; }
        .particle:nth-child(5) { left: 50%; animation-delay: -4s; }
        .particle:nth-child(6) { left: 60%; animation-delay: -5s; }
        .particle:nth-child(7) { left: 70%; animation-delay: -6s; }
        .particle:nth-child(8) { left: 80%; animation-delay: -7s; }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1001;
            overflow: hidden;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: fireworkExplode 1.8s ease-out forwards;
        }

        @keyframes fireworkExplode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .firework-core {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FFF;
            box-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
            animation: fireworkCore 0.3s ease-out forwards;
        }

        @keyframes fireworkCore {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(135deg, #FFF8DC, #FFFACD, #FFF8DC);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 520px;
            width: 90%;
            position: relative;
            box-shadow: 
                0 0 100px rgba(255, 215, 0, 0.7),
                0 0 50px rgba(255, 215, 0, 0.5),
                0 25px 70px rgba(0,0,0,0.5);
            border: 4px solid var(--primary-gold);
            transform: scale(0.8) rotateX(10deg);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.5) 0%, transparent 65%);
            animation: glowRotate 6s linear infinite;
            pointer-events: none;
        }

        .modal::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 25%, rgba(255, 215, 0, 0.15) 75%);
            border-radius: 30px;
            pointer-events: none;
        }

        @keyframes glowRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-overlay.active .modal {
            transform: scale(1) rotateX(0deg);
        }

        .modal-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .food-image {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFE4B5, #FFDAB9, #FFE4B5);
            font-size: 90px;
            box-shadow: 
                0 12px 35px rgba(0,0,0,0.25),
                0 0 50px rgba(255, 215, 0, 0.4),
                inset 0 0 30px rgba(255, 215, 0, 0.2);
            border: 5px solid var(--primary-gold);
            animation: foodAppear 0.6s ease-out;
            position: relative;
        }

        .food-image::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        @keyframes foodAppear {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .fortune-level {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 32px;
            margin-bottom: 10px;
            animation: textReveal 0.5s ease-out 0.3s both;
        }

        @keyframes textReveal {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .fortune-level.上上签 { color: #FFD700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .fortune-level.上签 { color: var(--primary-red); }
        .fortune-level.中签 { color: #FF8C00; }
        .fortune-level.下签 { color: #9370DB; }

        .food-name {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 36px;
            color: var(--text-dark);
            margin-bottom: 15px;
            animation: textReveal 0.5s ease-out 0.4s both;
        }

        .fortune-text {
            font-size: 16px;
            color: var(--text-gray);
            margin-bottom: 30px;
            line-height: 1.6;
            animation: textReveal 0.5s ease-out 0.5s both;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: textReveal 0.5s ease-out 0.6s both;
        }

        .modal-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-family: 'Noto Serif SC', sans-serif;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .modal-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .modal-btn:active::before {
            width: 300px;
            height: 300px;

                { id: 212, name: "上井日本料理", emoji: "🍣", description: "日料自助连锁", tags: ["group"] },
                { id: 213, name: "金钱豹", emoji: "🍣", description: "海鲜自助", tags: ["group"] },
                { id: 214, name: "亚马逊环球美食", emoji: "🍖", description: "环球自助", tags: ["group"] },
                { id: 215, name: "汉巴味德", emoji: "🍖", description: "烤肉自助", tags: ["group"] },
                { id: 216, name: "好世界", emoji: "🍳", description: "粤菜海鲜", tags: ["group"] },
                { id: 217, name: "顺风大酒店", emoji: "🍳", description: "本帮菜海鲜", tags: ["group"] },
                { id: 218, name: "小南国", emoji: "🍳", description: "上海本帮菜", tags: ["group"] },
                { id: 219, name: "老吉士", emoji: "🍳", description: "上海家常菜", tags: ["group"] },
                { id: 220, name: "福1015", emoji: "🍳", description: "高端本帮菜", tags: ["group"] },
                { id: 221, name: "雍福会", emoji: "🍳", description: "海派创意菜", tags: ["group"] },
                { id: 222, name: "逸龙阁", emoji: "🥟", description: "高端粤菜", tags: ["group"] },
                { id: 223, name: "福1088", emoji: "🍳", description: "本帮私房菜", tags: ["group"] },
                { id: 224, name: "花马天堂", emoji: "🍳", description: "云南创意菜", tags: ["group"] },
                { id: 225, name: "藏素", emoji: "🥗", description: "藏式素食", tags: ["group"] },
                { id: 226, name: "功德林", emoji: "🥗", description: "素食老字号", tags: ["group"] },
                { id: 227, name: "大蔬无界", emoji: "🥗", description: "创意素食", tags: ["group"] }
            ]
        };

        const fortuneLevels = [
            { level: "上上签", probability: 0.2, prefix: "天作之合", color: "#FFD700" },
            { level: "上签", probability: 0.3, prefix: "命运之选", color: "#C41E3A" },
            { level: "中签", probability: 0.3, prefix: "随缘而定", color: "#FF8C00" },
            { level: "下签", probability: 0.2, prefix: "逆天改命", color: "#9370DB" }
        ];

        const fortuneTexts = {
            "上上签": [
                "天作之合，今日宜吃这个！",
                "命中注定，就是它了！",
                "上上大吉，吃了好运！",
                "天赐良缘，胃与美食不可辜负！"
            ],
            "上签": [
                "命运告诉你，选它准没错！",
                "你的胃在说：就吃这个！",
                "天意如此，从了吧~",
                "缘分到了，吃嘛嘛香！"
            ],
            "中签": [
                "随缘而定，吃吃也无妨！",
                "平淡是真，简单也美味！",
                "随缘就好，味道不会差！",
                "一切随缘，吃饱最重要！"
            ],
            "下签": [
                "逆天改命，要不...再来一签？",
                "清淡养生，将就一下？",
                "命运在考验你，敢不敢接受？",
                "天将降大任于斯人，先吃这个！"
            ]
        };

        let currentPeriod = '';
        let remainingDraws = 3;
        let drawHistory = [];
        let shuffledFoodIndices = [];
        let currentShuffleIndex = 0;
        let currentResult = null;
        let audioContext = null;
        let mealType = 'solo';

        function selectMealType(type) {
            mealType = type;
            document.getElementById('soloBtn').classList.toggle('active', type === 'solo');
            document.getElementById('groupBtn').classList.toggle('active', type === 'group');
            shuffledFoodIndices = [];
            currentShuffleIndex = 0;
        }

        function getFilteredFoods() {
            const foods = foodsData[currentPeriod];
            if (!mealType) return foods;
            return foods.filter(food => food.tags && food.tags.includes(mealType));
        }

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playShakeSound() {
            if (!audioContext) return;
            
            for (let i = 0; i < 3; i++) {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.type = 'triangle';
                const baseFreq = 120 + Math.random() * 60;
                oscillator.frequency.setValueAtTime(baseFreq, audioContext.currentTime + i * 0.05);
                oscillator.frequency.exponentialRampToValueAtTime(60 + Math.random() * 40, audioContext.currentTime + i * 0.05 + 0.08);
                
                gainNode.gain.setValueAtTime(0.06, audioContext.currentTime + i * 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.05 + 0.08);
                
                oscillator.start(audioContext.currentTime + i * 0.05);
                oscillator.stop(audioContext.currentTime + i * 0.05 + 0.08);
            }
        }

        function playRevealSound() {
            if (!audioContext) return;
            
            const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
            
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                const startTime = audioContext.currentTime + index * 0.15;
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.1, startTime + 0.08);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.6);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + 0.6);
            });
        }

        function launchFireworks() {
            const container = document.getElementById('fireworksContainer');
            container.innerHTML = '';
            const colors = ['#FFD700', '#FF6347', '#00CED1', '#FF69B4', '#7B68EE', '#FFA500', '#00FF7F', '#FF1493'];
            
            for (let burst = 0; burst < 8; burst++) {
                setTimeout(() => {
                    const centerX = window.innerWidth / 2 + (Math.random() - 0.5) * 300;
                    const centerY = window.innerHeight / 2 + (Math.random() - 0.5) * 200;
                    const color = colors[burst % colors.length];
                    
                    const core = document.createElement('div');
                    core.className = 'firework-core';
                    core.style.left = (centerX - 4) + 'px';
                    core.style.top = (centerY - 4) + 'px';
                    container.appendChild(core);
                    setTimeout(() => core.remove(), 300);
                    
                    for (let i = 0; i < 40; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'firework';
                        particle.style.left = centerX + 'px';
                        particle.style.top = centerY + 'px';
                        particle.style.background = color;
                        particle.style.boxShadow = `0 0 8px ${color}, 0 0 15px ${color}`;
                        
                        const angle = (Math.PI * 2 * i) / 40 + (Math.random() - 0.5) * 0.3;
                        const distance = 100 + Math.random() * 180;
                        const tx = Math.cos(angle) * distance;
                        const ty = Math.sin(angle) * distance;
                        
                        particle.style.setProperty('--tx', tx + 'px');
                        particle.style.setProperty('--ty', ty + 'px');
                        
                        container.appendChild(particle);
                        
                        setTimeout(() => {
                            particle.remove();
                        }, 1800);
                    }
                }, burst * 300);
            }
        }

        function getPeriod() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 10) return 'breakfast';
            if (hour >= 10 && hour < 16) return 'lunch';
            return 'dinner';
        }

        function getPeriodName(period) {
            const names = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' };
            return names[period];
        }

        function getRandomFortune() {
            const rand = Math.random();
            let cumulative = 0;
            for (const fortune of fortuneLevels) {
                cumulative += fortune.probability;
                if (rand <= cumulative) {
                    return fortune;
                }
            }
            return fortuneLevels[fortuneLevels.length - 1];
        }

        function shuffleFoodArray(foods) {
            const indices = Array.from({ length: foods.length }, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            return indices;
        }

        function getRandomFood() {
            const foods = getFilteredFoods();
            
            if (foods.length === 0) {
                return foodsData[currentPeriod][Math.floor(Math.random() * foodsData[currentPeriod].length)];
            }
            
            if (shuffledFoodIndices.length === 0 || currentShuffleIndex >= shuffledFoodIndices.length) {
                shuffledFoodIndices = shuffleFoodArray(foods);
                currentShuffleIndex = 0;
            }
            
            const drawnFoodIds = drawHistory.map(item => item.foodId);
            
            while (currentShuffleIndex < shuffledFoodIndices.length) {
                const foodIndex = shuffledFoodIndices[currentShuffleIndex];
                currentShuffleIndex++;
                const food = foods[foodIndex];
                
                if (!drawnFoodIds.includes(food.id)) {
                    return food;
                }
            }
            
            shuffledFoodIndices = shuffleFoodArray(foods);
            currentShuffleIndex = 0;
            
            while (currentShuffleIndex < shuffledFoodIndices.length) {
                const foodIndex = shuffledFoodIndices[currentShuffleIndex];
                currentShuffleIndex++;
                const food = foods[foodIndex];
                
                if (!drawnFoodIds.includes(food.id)) {
                    return food;
                }
            }
            
            return foods[Math.floor(Math.random() * foods.length)];
        }

        function init() {
            const today = new Date().toDateString();
            const savedData = localStorage.getItem('lotteryData');
            
            if (savedData) {
                const data = JSON.parse(savedData);
                if (data.date === today) {
                    remainingDraws = data.remainingDraws;
                    drawHistory = data.drawHistory || [];
                    
                    if (data.finalChoice) {
                        showEndPage(data.finalChoice);
                        return;
                    }
                    
                    if (remainingDraws === 0 && drawHistory.length === 3) {
                        showFinalChoice();
                        return;
                    }
                } else {
                    saveData();
                }
            } else {
                saveData();
            }

            currentPeriod = getPeriod();
            updatePeriodHint();
            updateRemainingCount();
        }

        function saveData() {
            const data = {
                date: new Date().toDateString(),
                remainingDraws,
                drawHistory,
                period: currentPeriod
            };
            localStorage.setItem('lotteryData', JSON.stringify(data));
        }

        function updatePeriodHint() {
            const hint = document.getElementById('periodHint');
            hint.textContent = `现在是${getPeriodName(currentPeriod)}时间，求一签吧~`;
        }

        function updateRemainingCount() {
            const countEl = document.getElementById('remainingCount');
            countEl.textContent = `今日剩余：${remainingDraws}签`;
            
            if (remainingDraws === 3) {
                countEl.style.background = 'linear-gradient(135deg, #4CAF50, #2E7D32)';
            } else if (remainingDraws === 2) {
                countEl.style.background = 'linear-gradient(135deg, #FF9800, #F57C00)';
            } else if (remainingDraws === 1) {
                countEl.style.background = 'linear-gradient(135deg, #F44336, #C62828)';
            } else {
                countEl.style.background = 'linear-gradient(135deg, #999, #666)';
            }
        }

        function startDraw() {
            if (remainingDraws <= 0) return;

            initAudio();

            const box = document.getElementById('lotteryBox');
            const flyingStick = document.getElementById('flyingStick');
            const drawBtn = document.getElementById('drawBtn');

            drawBtn.disabled = true;
            box.classList.add('shaking');

            let shakeCount = 0;
            const shakeInterval = setInterval(() => {
                playShakeSound();
                shakeCount++;
                if (shakeCount >= 4) {
                    clearInterval(shakeInterval);
                }
            }, 200);

            setTimeout(() => {
                box.classList.remove('shaking');
                flyingStick.classList.add('animate');

                setTimeout(() => {
                    flyingStick.classList.remove('animate');
                    playRevealSound();
                    showResult();
                    drawBtn.disabled = false;
                }, 600);
            }, 800);
        }

        function showResult() {
            const food = getRandomFood();
            const fortune = getRandomFortune();
            const texts = fortuneTexts[fortune.level];
            const text = texts[Math.floor(Math.random() * texts.length)];

            currentResult = {
                food,
                fortune,
                text
            };

            drawHistory.push({
                foodId: food.id,
                foodName: food.name,
                foodEmoji: food.emoji,
                level: fortune.level,
                text
            });

            remainingDraws--;
            saveData();
            updateRemainingCount();

            document.getElementById('foodEmoji').textContent = food.emoji;
            document.getElementById('fortuneLevel').textContent = `${fortune.prefix} · ${fortune.level}`;
            document.getElementById('fortuneLevel').className = `fortune-level ${fortune.level}`;
            document.getElementById('foodName').textContent = food.name;
            document.getElementById('fortuneText').textContent = `${food.description} —— ${text}`;

            document.getElementById('resultModal').classList.add('active');

            if (fortune.level === '上上签') {
                launchFireworks();
            }
        }

        function confirmChoice() {
            document.getElementById('resultModal').classList.remove('active');
            const data = JSON.parse(localStorage.getItem('lotteryData'));
            data.finalChoice = currentResult;
            localStorage.setItem('lotteryData', JSON.stringify(data));
            showEndPage(currentResult);
        }

        function showOrderModal() {
            if (currentResult) {
                document.getElementById('orderEmoji').textContent = currentResult.food.emoji;
            }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        function drawAgain() {
            document.getElementById('resultModal').classList.remove('active');
            
            if (remainingDraws <= 0) {
                setTimeout(() => showFinalChoice(), 300);
            } else {
                setTimeout(() => startDraw(), 500);
            }
        }

        function showFinalChoice() {
            const container = document.getElementById('finalChoices');
            container.innerHTML = '';

            drawHistory.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'final-choice-card';
                card.innerHTML = `
                    <div class="emoji">${item.foodEmoji}</div>
                    <div class="name">${item.foodName}</div>
                    <div class="level">${item.level}</div>
                `;
                card.onclick = () => selectFinalChoice(item);
                container.appendChild(card);
            });

            document.getElementById('finalChoiceModal').classList.add('active');
        }

        function selectFinalChoice(item) {
            document.getElementById('finalChoiceModal').classList.remove('active');
            const data = JSON.parse(localStorage.getItem('lotteryData'));
            data.finalChoice = item;
            localStorage.setItem('lotteryData', JSON.stringify(data));
            showEndPage(item);
        }

        function showEndPage(result) {
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('endPage').classList.remove('hidden');
            document.getElementById('endFoodEmoji').textContent = result.foodEmoji || '🍗';
            document.getElementById('endText').textContent = `你选择了 ${result.foodName || result.food.name} —— 命运的安排，真香！`;
        }

        function resetDay() {
            localStorage.removeItem('lotteryData');
            remainingDraws = 3;
            drawHistory = [];
            currentResult = null;
            shuffledFoodIndices = [];
            currentShuffleIndex = 0;
            
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('endPage').classList.add('hidden');
            
            currentPeriod = getPeriod();
            updatePeriodHint();
            updateRemainingCount();
            saveData();
        }

        init();
    </script>
